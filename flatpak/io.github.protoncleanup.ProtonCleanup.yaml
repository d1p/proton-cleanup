app-id: io.github.protoncleanup.ProtonCleanup
runtime: org.freedesktop.Platform
runtime-version: "24.08"
sdk: org.freedesktop.Sdk
command: proton-cleanup

finish-args:
  # Needs host filesystem access to inspect Steam libraries and delete compatdata/tools.
  - --filesystem=host

modules:
  - name: proton-cleanup
    buildsystem: simple
    build-commands:
      - python3 -m pip install --prefix=/app --no-index --find-links=flatpak/wheels hatchling==1.27.0
      - python3 -m pip install --prefix=/app --no-index --find-links=flatpak/wheels textual==8.1.1 platformdirs vdf==3.4
      - python3 -m pip install --prefix=/app --no-index --find-links=flatpak/wheels --no-build-isolation --no-deps .
      - install -Dm644 data/io.github.protoncleanup.ProtonCleanup.desktop /app/share/applications/io.github.protoncleanup.ProtonCleanup.desktop
      - install -Dm644 data/io.github.protoncleanup.ProtonCleanup.metainfo.xml /app/share/metainfo/io.github.protoncleanup.ProtonCleanup.metainfo.xml
      - install -Dm644 data/icons/io.github.protoncleanup.ProtonCleanup.png /app/share/icons/hicolor/512x512/apps/io.github.protoncleanup.ProtonCleanup.png
    sources:
      - type: dir
        path: ..
